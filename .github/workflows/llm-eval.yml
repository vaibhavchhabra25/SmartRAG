name: LLM Quality Eval

# Manual-only: this workflow makes real LLM calls (guardrail classification, hallucination judge,
# generation, RAGAS evaluation) — dozens of calls per run. Deliberately NOT wired to push/PR
# triggers, since the free-tier GROQ_API_KEY this project tests against rate-limits well before
# that volume would be sustainable on every commit. Run it manually when you want a quality gate
# before a release, or point GROQ_API_KEY/ANTHROPIC_API_KEY at a less-constrained key.
on:
  workflow_dispatch:

jobs:
  llm-eval:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'groq' }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build index
        run: python -m app.ingest
      - name: Guardrail + hallucination unit tests
        run: pytest tests/test_guardrails.py tests/test_hallucination.py -v
      - name: RAGAS + guardrail quality eval (asserted thresholds, appends to eval/*_history.jsonl)
        run: pytest tests/test_eval.py -v
      - name: Build trend report from history (flags regressions vs previous run)
        if: always()
        run: python -m eval.eval_trend
      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: |
            eval/report.md
            eval/guardrail_report.md
            eval/eval_trend.md
            eval/ragas_history.jsonl
            eval/guardrail_history.jsonl
      # History files (eval/*_history.jsonl) are updated on disk here but NOT auto-committed -
      # this workflow is already deliberately manual (see header comment); committing the new
      # history is a separate, deliberate step too. Download the updated files from this run's
      # artifact/logs and commit them yourself when you want this run on the permanent record.
